<!DOCTYPE html>
<html>
<head>
<title>Propel AI</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#0f172a;
color:white;
}

/* SIDEBAR */

#sidebar{
width:220px;
background:#020617;
padding:10px;
overflow-y:auto;
}

#newChat{
width:100%;
padding:10px;
margin-bottom:10px;
cursor:pointer;
}

.chatItem{
padding:8px;
cursor:pointer;
border-bottom:1px solid #1e293b;
}

.chatItem:hover{
background:#1e293b;
}

/* MAIN CHAT AREA */

#main{
flex:1;
display:flex;
flex-direction:column;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.user{
color:#38bdf8;
margin:8px;
}

.ai{
color:#a3e635;
margin:8px;
}

#inputArea{
padding:10px;
background:#020617;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
}

</style>
</head>

<body>

<div id="sidebar">

<button id="newChat">➕ New Chat</button>

<div id="chatList"></div>

</div>

<div id="main">

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Talk to Propel AI">
<button onclick="talk()">Send</button>
</div>

</div>

<script>

let chats = JSON.parse(localStorage.getItem("propelChats")) || {};
let currentChat = null;

/* Create new chat */

function newChat(){

let id = "chat_" + Date.now();

chats[id] = [];

currentChat = id;

saveChats();

renderChatList();

loadChat();

}

/* Save chats */

function saveChats(){

localStorage.setItem("propelChats", JSON.stringify(chats));

}

/* Sidebar */

function renderChatList(){

let list = document.getElementById("chatList");

list.innerHTML = "";

for(let id in chats){

let div = document.createElement("div");

div.className = "chatItem";

div.innerText = id;

div.onclick = ()=>{

currentChat = id;

loadChat();

};

list.appendChild(div);

}

}

/* Load chat */

function loadChat(){

let chatBox = document.getElementById("chat");

chatBox.innerHTML = "";

let messages = chats[currentChat];

messages.forEach(msg=>{

addMessage(msg.text,msg.type,false);

});

}

/* Add message */

function addMessage(text,type,save=true){

let chat = document.getElementById("chat");

let msg = document.createElement("div");

msg.className = type;

msg.innerText = text;

chat.appendChild(msg);

chat.scrollTop = chat.scrollHeight;

if(save){

chats[currentChat].push({text,type});

saveChats();

}

}

/* AI logic */

function keyboardSmash(text){

return /^[asdfghjklqwertyuiopzxcvbnm]{6,}$/i.test(text);

}

let randomReplies = [

"Interesting. Tell me more.",
"Hmm… that makes me curious.",
"I see what you mean.",
"That's fascinating!",
"I'm thinking about that."

];

function talk(){

let input = document.getElementById("input").value;

if(!input || !currentChat) return;

addMessage("You: "+input,"user");

let text = input.toLowerCase();

let reply="";

if(keyboardSmash(text)){

reply="I can't seem to understand, but you must be mad!";

}

else if(text.includes("hello")){

reply="Hello! I'm Propel AI.";

}

else if(text.includes("your name")){

reply="My name is Propel AI.";

}

else if(text.endsWith("?")){

reply="That's a good question.";

}

else{

reply=randomReplies[Math.floor(Math.random()*randomReplies.length)];

}

setTimeout(()=>{

addMessage("Propel AI: "+reply,"ai");

},800);

document.getElementById("input").value="";

}

/* ENTER key */

document.getElementById("input").addEventListener("keypress",function(e){

if(e.key==="Enter") talk();

});

/* Button */

document.getElementById("newChat").onclick=newChat;

/* Start */

renderChatList();

if(Object.keys(chats).length===0){

newChat();

}else{

currentChat=Object.keys(chats)[0];

loadChat();

}

</script>

</body>
</html>
